<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolSafe — Цифровой сервис школы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; }
        .apple-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }
        .sos-gradient {
            background: linear-gradient(135deg, #ff3b30 0%, #ff2d55 100%);
        }
    </style>
</head>
<body x-data="schoolApp()">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center p-6">
            <div class="apple-glass p-10 w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold">S</div>
                    <h1 class="text-2xl font-semibold">Вход в SchoolSafe</h1>
                    <p class="text-gray-500 text-sm mt-2">Введите данные для доступа к системе</p>
                </div>
                <div class="space-y-4">
                    <input type="text" placeholder="Email или телефон" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <input type="password" placeholder="Пароль" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <button @click="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-semibold hover:bg-blue-700 transition shadow-lg">Войти</button>
                </div>
                <p class="text-center text-xs text-gray-400 mt-6 cursor-pointer">Восстановить пароль</p>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
            
            <header class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-semibold">Панель управления</h2>
                    <p class="text-gray-500 text-sm">Добро пожаловать, <span class="font-medium text-gray-800">Администратор</span></p>
                </div>
                <button @click="isLoggedIn = false" class="text-sm text-red-500 font-medium">Выйти</button>
            </header>

            <div class="flex flex-col md:flex-row gap-6">
                <aside class="w-full md:w-1/3 space-y-4">
                    <div class="apple-glass p-4 shadow-sm">
                        <input type="text" x-model="searchQuery" placeholder="Поиск ученика (напр. Сардор)..." 
                               class="w-full bg-transparent p-2 outline-none border-b border-gray-100">
                    </div>
                    
                    <div class="apple-glass overflow-hidden shadow-sm">
                        <div class="p-4 bg-gray-50/50 border-b border-gray-100 text-xs font-bold text-gray-400 uppercase tracking-wider">Результаты</div>
                        <div class="max-h-64 overflow-y-auto">
                            <template x-for="student in filteredStudents()" :key="student.id">
                                <div @click="selectedStudent = student" 
                                     class="p-4 hover:bg-blue-50 cursor-pointer transition flex items-center gap-3 border-b border-gray-50 last:border-0"
